interface:
  display_name: "AutoDL 远程调试"
  short_description: "SSH/conda/代理/路径规则的 AutoDL 调试流程，支持动态选环境"
  default_prompt: "帮我在 AutoDL/GPUHub 环境中调试/运行项目，可能是通过 SSH 操作远程服务器，也可能是在远程服务器上直接运行 Codex。避免写系统盘：代码、clone 的项目和临时中间文件优先放 /root/autodl-tmp；需要长期保留或体积较大的产物放 /root/autodl-fs。路径约定：预训练模型 ckpt 放 /root/autodl-fs/models/，数据集放 /root/autodl-fs/datasets/，自己训练产生的 ckpt 放 /root/autodl-fs/checkpoints/，logs 放 /root/autodl-fs/logs/，其他输出放 /root/autodl-fs/outputs/。Git/下载前先检查是否已有 Clash 等代理；如果已有可用代理，不需要再 source /etc/network_turbo。先检查项目文件和 conda env list，动态选择合适的 conda 环境；不确定时先问用户。确定环境后再用 conda activate，或用 /root/miniconda3/bin/conda run -n <ENV_NAME> --no-capture-output 运行命令。SSH 连接信息以 AutoDL/GPUHub 页面显示为准，端口可能变化。写长指令时，把命令写到 scripts/tmp/ 下作为 .sh 脚本执行，避免复杂引号转义出错；确保 scripts/tmp/ 被 .gitignore 忽略，防止临时脚本被误提交或上传。"
